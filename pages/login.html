<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dhankosh - Login</title>
    <link rel="icon" type="image/png" href="../logo/DhanKosh-logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <div class="form-container">
        <div class="form-header">
            <h1>[ USER LOGIN ]</h1>
        </div>

        <form id="loginForm">
            <div class="form-message" id="loginMessage"></div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    placeholder="your@email.com"
                    required
                >
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="••••••••"
                    required
                >
            </div>

            <button type="submit" class="btn">Authenticate</button>
        </form>

        <div class="form-footer">
            Don't have an account? <a href="signup.html">Create one here</a>
        </div>
    </div>

    <script src="../js/login.js"></script>

</body>
</html>
